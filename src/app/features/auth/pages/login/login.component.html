<div class="min-h-screen flex items-center justify-center p-4 bg-[#eef2f7]">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200
              w-[420px] min-h-[470px] px-10 py-9">
    <div class="flex justify-center">
      <div class="w-16 h-16 rounded-full flex items-center justify-center bg-blue-100">
        <span class="font-bold text-lg text-blue-600">HRM</span>
      </div>
    </div>
    <h1 class="mt-8 text-center text-xl font-semibold text-slate-800">
      {{ 'LOGIN.TITLE' | translate }}
    </h1>
    <p class="mt-1 text-center text-sm text-slate-500">
      {{ 'LOGIN.SUBTITLE' | translate }}
    </p>
    @if (errorMsg) {
      <div class="flex items-center gap-2 bg-red-50 mt-4 border border-red-200
                  text-red-700 rounded-lg px-4 py-3 mb-2 text-sm">
        <span>{{ errorMsg }}</span>
      </div>
    }
    <app-dynamic-form
      [fields]="fields"
      [submitLabel]="'LOGIN.SUBMIT' | translate"
      [isLoading]="isLoading"
      (formSubmit)="onLogin($event)"
    />
    <p class="text-center mt-4 text-[10px] text-gray-400">
      {{ 'LOGIN.HINT' | translate }}
    </p>

  </div>
</div>
