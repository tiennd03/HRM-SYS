<div class="fixed inset-0 bg-black/50 flex items-center justify-center">

  <div class="flex flex-col items-center py-2 rounded-3xl border border-gray-200 bg-white whitespace-normal">
    <div class="flex h-14 w-14   items-center justify-center p-4 mt-3 rounded-full border border-red-300 bg-red-100 text-[22px]">
        <app-trash-icon class="w-4 h-4">

        </app-trash-icon>
    </div>
    <div class="mt-3 text-center text-base font-bold text-gray-800">
      {{ 'CONFIRM_DIALOG.DELETE' | translate }}
    </div>
    <div class="py-1 text-center text-xs text-gray-500">
      {{ 'CONFIRM_DIALOG.DELETE_MESSAGE' | translate : {username} }}
    </div>

    <div class="flex gap-2 p-2 mt-5 w-full">
      <button
        class="flex-1 px-4 py-2 border rounded text-xs"
        (click)="onCancel()">
        {{ 'BTN.CANCEL_BTN' | translate }}
      </button>

      <button
        class="flex-1 px-4 py-2 bg-red-600 text-white rounded text-xs"
        (click)="onConfirm()">
        {{ 'BTN.DELETE_BTN' | translate }}
      </button>
    </div>
  </div>
</div>
