<form [formGroup]="form" (ngSubmit)="onSubmit()">

  @for (field of fields(); track field.name) {

    @if (field.type === 'text') {
      <app-text-field
        [config]="field"
        [control]="getControl(field.name)"
      />
    }
    @if (field.type === 'password') {
      <app-password-field
        [config]="field"
        [control]="getControl(field.name)"
      />
    }
    @if (field.type === 'checkbox') {
      <app-checkbox-field
        [config]="field"
        [control]="getControl(field.name)"
      />
    }
  }
  <ng-content/>
</form>
