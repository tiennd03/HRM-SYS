<div class="flex flex-col gap-2 w-full"
  [ngClass]="config().className?.container ?? ''">
  <label
  *ngIf="config().label"
  class="text-sm font-medium text-gray-700"
    [ngClass]="config().className?.label ?? ''">
    
    {{ config().label | translate }}
  </label>
  
  <select
  [formControl]="control()"
  
  class="select-box"
  [class]="config().className?.input ?? ''"
  [class.selected]="!!control().value">
  
    <option
    *ngIf="config().placeholder"
    
    value=""
    disabled>
      {{ config().placeholder | translate }}
    </option>

    <option
    *ngFor="let option of config().options"
    [ngValue]="option.value"
    [ngClass]="config().className?.option">
    
    {{ option.label | translate }}
    
  </option>
  
  </select>

</div>
