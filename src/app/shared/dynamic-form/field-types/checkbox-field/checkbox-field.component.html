<div class="flex items-center mb-6">
  <input
    type="checkbox"
    [id]="config().name"
    [formControl]="control()"
    [className]="config().className?.input ?? ''">
  <label [for]="config().name" 
    class="text-gray-500 text-sm select-none cursor-pointer ml-2">
    {{ config().label | translate }}
  </label>

</div>
