<div class="mb-4">
 <label class="block text-sm font-semibold mb-1.5 text-gray-700">
    {{ config().label | translate}}
 </label>
 <input [type]="config().type"
        [placeholder]="config().placeholder |translate"
        [formControl]="control()"
        class="w-full rounded-lg outline-none text-sm px-3.5 py-2.5
               border text-gray-900 transition-all
               focus:ring-2 focus:ring-blue-100"
        [class.border-red-400]="control().invalid && control().touched"
        [class.border-slate-300]="!(control().invalid && control().touched)"
 />
 @if (control().invalid && control().touched) {
   @if (control().hasError('required')) {
     <p>{{ config().errorMessage?.required | translate}}</p>
   }
   @if (control().hasError('minLength')) {
     <p>{{ config().errorMessage?.minLength | translate}}</p>
   }
 }
</div>
