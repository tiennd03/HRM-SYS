<header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-full bg-blue-100 text-blue-600 font-bold
                flex items-center justify-center text-sm">
      {{ initials() }}
    </div>

    <span class="text-sm font-medium text-gray-700">
      {{ displayName() }}
    </span>

    <button
      type="button"
      (click)="onLogout()"
      class="text-sm text-gray-500 hover:text-red-600 transition-colors ml-2"
    >
      {{ 'HEADER.LOGOUT' | translate }}
    </button>
  </div>
</header>
